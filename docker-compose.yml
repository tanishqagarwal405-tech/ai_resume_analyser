version: '3.8'

services:
  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - NODE_ENV=production
      - FRONTEND_URL=${FRONTEND_URL}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - resume-network

  # Frontend Service  
  frontend:
    build:
      context: ./mern_ai
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: resume-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - resume-network

networks:
  resume-network:
    driver: bridge

volumes:
  uploads_data:
    driver: local